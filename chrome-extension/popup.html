<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1> Task Agent</h1>

    <div id="task-list">
      <!-- les tâches s'affichent ici -->
    </div>

    <div class="input-area">
      <input 
        type="text" 
        id="user-input" 
        placeholder="Ex: ajoute faire la vaisselle…"
        autofocus
      />
      <button id="send-btn">Envoyer</button>
    </div>

    <div id="status"></div>

    <div class="api-key-area">
      <input type="password" id="api-key" placeholder="Ta clé API Anthropic" />
      <button id="save-key-btn">Sauvegarder</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
